<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bot Admin Panel</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --border: #262b36;
    --text: #e6e8ec;
    --muted: #9aa2b1;
    --accent: #4f8cff;
    --accent-hover: #3d75e0;
    --danger: #ff5c5c;
    --success: #4fd67a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    width: 100%;
  }
  #login-card { max-width: 380px; }
  #dashboard-card { max-width: 640px; display: none; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  p.subtitle { color: var(--muted); margin: 0 0 24px; font-size: 14px; }
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; margin-top: 18px; }
  label:first-of-type { margin-top: 0; }
  input[type="password"], textarea {
    width: 100%;
    background: #0d0f14;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
  }
  textarea { min-height: 90px; }
  button {
    cursor: pointer;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 600;
    color: white;
    background: var(--accent);
    transition: background 0.15s ease;
  }
  button:hover { background: var(--accent-hover); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.secondary { background: transparent; border: 1px solid var(--border); color: var(--text); }
  button.danger { background: var(--danger); }
  .full-width { width: 100%; margin-top: 20px; }
  .msg {
    margin-top: 14px;
    font-size: 13px;
    padding: 8px 10px;
    border-radius: 6px;
    display: none;
  }
  .msg.error { background: rgba(255, 92, 92, 0.12); color: var(--danger); display: block; }
  .msg.success { background: rgba(79, 214, 122, 0.12); color: var(--success); display: block; }
  .section {
    border-top: 1px solid var(--border);
    padding-top: 20px;
    margin-top: 24px;
  }
  .section:first-of-type { border-top: none; padding-top: 0; margin-top: 0; }
  .row { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .stat {
    font-size: 13px;
    color: var(--muted);
  }
  .stat strong { color: var(--text); }
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
</style>
</head>
<body>

  <!-- LOGIN VIEW -->
  <div class="card" id="login-card">
    <h1>Bot Admin Panel</h1>
    <p class="subtitle">Enter the password to manage bot messages.</p>
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    <button class="full-width" id="login-btn">Log in</button>
    <div class="msg" id="login-msg"></div>
  </div>

  <!-- DASHBOARD VIEW -->
  <div class="card" id="dashboard-card">
    <div class="top-bar">
      <div>
        <h1>Bot Admin Panel</h1>
        <p class="subtitle" style="margin-bottom:0;">Manage your bot's messages</p>
      </div>
      <button class="secondary" id="logout-btn">Log out</button>
    </div>

    <div class="section">
      <div class="row">
        <span class="stat">Total users: <strong id="user-count">–</strong></span>
      </div>
    </div>

    <div class="section">
      <label for="welcome-input">Welcome message (sent on /start)</label>
      <textarea id="welcome-input" placeholder="Welcome message..."></textarea>
      <button id="save-welcome-btn" style="margin-top:12px;">Save welcome message</button>
      <div class="msg" id="welcome-msg"></div>
    </div>

    <div class="section">
      <label for="broadcast-input">Broadcast message</label>
      <textarea id="broadcast-input" placeholder="Broadcast message..."></textarea>
      <div class="row" style="margin-top:12px;">
        <button id="save-broadcast-btn">Save broadcast message</button>
        <button id="send-broadcast-btn" class="danger">Send to all users</button>
      </div>
      <div class="msg" id="broadcast-msg"></div>
    </div>
  </div>

<script>
  const $ = (id) => document.getElementById(id);

  const loginCard = $('login-card');
  const dashboardCard = $('dashboard-card');

  function showMsg(el, text, type) {
    el.textContent = text;
    el.className = 'msg ' + type;
  }

  function hideMsg(el) {
    el.textContent = '';
    el.className = 'msg';
  }

  async function checkSession() {
    const res = await fetch('/api/session');
    const data = await res.json();
    if (data.authenticated) {
      showDashboard();
    } else {
      loginCard.style.display = 'block';
      dashboardCard.style.display = 'none';
    }
  }

  async function showDashboard() {
    loginCard.style.display = 'none';
    dashboardCard.style.display = 'block';
    await loadMessages();
    await loadStats();
  }

  async function loadMessages() {
    const res = await fetch('/api/messages');
    if (!res.ok) return;
    const data = await res.json();
    $('welcome-input').value = data.welcomeMessage || '';
    $('broadcast-input').value = data.broadcastMessage || '';
  }

  async function loadStats() {
    const res = await fetch('/api/stats');
    if (!res.ok) return;
    const data = await res.json();
    $('user-count').textContent = data.userCount;
  }

  $('login-btn').addEventListener('click', async () => {
    const password = $('password').value;
    const msgEl = $('login-msg');
    hideMsg(msgEl);

    $('login-btn').disabled = true;
    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password }),
      });
      const data = await res.json();

      if (res.ok && data.success) {
        $('password').value = '';
        await showDashboard();
      } else {
        showMsg(msgEl, data.error || 'Login failed', 'error');
      }
    } catch (err) {
      showMsg(msgEl, 'Network error. Please try again.', 'error');
    } finally {
      $('login-btn').disabled = false;
    }
  });

  $('password').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') $('login-btn').click();
  });

  $('logout-btn').addEventListener('click', async () => {
    await fetch('/api/logout', { method: 'POST' });
    checkSession();
  });

  $('save-welcome-btn').addEventListener('click', async () => {
    const msgEl = $('welcome-msg');
    hideMsg(msgEl);
    const message = $('welcome-input').value;

    const res = await fetch('/api/messages/welcome', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message }),
    });
    const data = await res.json();

    if (res.ok && data.success) {
      showMsg(msgEl, 'Welcome message saved.', 'success');
    } else {
      showMsg(msgEl, data.error || 'Failed to save.', 'error');
    }
  });

  $('save-broadcast-btn').addEventListener('click', async () => {
    const msgEl = $('broadcast-msg');
    hideMsg(msgEl);
    const message = $('broadcast-input').value;

    const res = await fetch('/api/messages/broadcast', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message }),
    });
    const data = await res.json();

    if (res.ok && data.success) {
      showMsg(msgEl, 'Broadcast message saved.', 'success');
    } else {
      showMsg(msgEl, data.error || 'Failed to save.', 'error');
    }
  });

  $('send-broadcast-btn').addEventListener('click', async () => {
    const msgEl = $('broadcast-msg');
    hideMsg(msgEl);

    if (!confirm('Send the broadcast message to ALL users now?')) return;

    $('send-broadcast-btn').disabled = true;
    showMsg(msgEl, 'Sending broadcast…', 'success');

    try {
      const res = await fetch('/api/broadcast/send', { method: 'POST' });
      const data = await res.json();

      if (res.ok && data.success) {
        showMsg(msgEl, `Broadcast sent. Total: ${data.total}, Sent: ${data.sent}, Failed: ${data.failed}`, 'success');
      } else {
        showMsg(msgEl, data.error || 'Broadcast failed.', 'error');
      }
    } catch (err) {
      showMsg(msgEl, 'Network error during broadcast.', 'error');
    } finally {
      $('send-broadcast-btn').disabled = false;
    }
  });

  checkSession();
</script>
</body>
</html>
